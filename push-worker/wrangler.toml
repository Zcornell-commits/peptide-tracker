name = "peptide-push"
main = "src/index.js"
compatibility_date = "2026-06-01"
# @block65/webcrypto-web-push imports a Node builtin shim, so this is required:
compatibility_flags = ["nodejs_compat"]

# Fire every minute; the Worker itself checks whether it's the user's reminder
# time (in their timezone), so delivery is at most ~60s late.
[triggers]
crons = ["* * * * *"]

# KV holds exactly ONE record: { subscription, time, tz, lastSent }. No peptide data.
# `setup.sh` fills the id in automatically; or run:
#   npx wrangler kv namespace create PEPTIDE_KV   and paste the id below.
[[kv_namespaces]]
binding = "PEPTIDE_KV"
id = "9df66ac2737a4ba7964130728af67bde"

[vars]
# Contact for the push service. A URL is fine and keeps an email out of a public repo.
VAPID_SUBJECT = "https://zcornell-commits.github.io/peptide-tracker/"
VAPID_PUBLIC_KEY = "BN6aXAXXNdREY6FoRMDWjv-AdXZ_JDAeDmcnGxiURVRqqz5FR0y4RP3iE1iXF1z2W9hFrm974-RJMQlhDciIhSk"
# VAPID_PRIVATE_KEY is a SECRET — never put it here. Set it with:
#   printf '%s' "<private key>" | npx wrangler secret put VAPID_PRIVATE_KEY
